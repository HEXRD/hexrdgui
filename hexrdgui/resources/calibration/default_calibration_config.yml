powder:
  eta_tol: 5.0
  fit_tth_tol: 0.1
  int_cutoff: 0.0001
  pk_type: 'gaussian'
  bg_type: 'linear'
  auto_guess_initial_fwhm: true
  initial_fwhm: 1.0
  # Fixed pink-beam asymmetry parameters (typically taken from a prior
  # WPPF pvpink refinement). Only applied when `enabled` is true AND
  # pk_type == 'pink_beam_dcs'. Defaults match the hexrd internal
  # pink-beam defaults so they are sensible if the user enables the
  # option without ever populating from WPPF.
  fixed_pink_asymmetry:
    enabled: false
    alpha0: 14.4
    alpha1: 0.0
    beta0: 3.016
    beta1: -7.94
laue_auto_picker:
  npdiv: 2
  tth_tol: 5.0
  eta_tol: 5.0
  fit_peaks: true
  fit_tth_tol: 0.1
  min_peak_int: 1.0
  do_smoothing: true
  smoothing_sigma: 2.0
  use_blob_detection: true
  blob_threshold: 0.25
crystal:
  grain_id: 2
  inv_stretch: [1.0, 1.0, 1.0, 0.0, 0.0, 0.0]
  orientation: [0.0, 0.0, 0.0]
  position: [0.0, 0.0, 0.0]
